agent:
  name: rlpd
  class: oneshot.agents.rlpd.RLPD
  params:
    obs_dim: 1024
    action_dim: 7 # refer se3, take xyz+euler+gripper
    action_range: [0, 1]
    device: cuda
    discount: 0.99
    init_temperature: 0.1
    alpha_lr: 1e-4
    alpha_betas: [0.9, 0.999]
    action_lr: 1e-4
    action_betas: [0.9, 0.999]
    action_update_frequency: 1
    critic_lr: 1e-4
    critic_betas: [0.9, 0.999]
    critic_tau: 0.005
    critic_target_update_frequency: 1
    batch_size: 256
    learnable_temperature: true
    
env:
  pretrain: true
  episode_length: 400
  offline_data_path: /home/yun4/workspace/Real_Franka/Reinforcement_Learning/oneshot/dataset/rollout_data.npz